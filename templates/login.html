<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Rosca App</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom Style -->
    <style>
      body {
        background: linear-gradient(135deg, #4e73df, #1cc88a);
        height: 100vh;
      }

      .login-card {
        border-radius: 15px;
        padding: 30px;
      }

      .form-control {
        border-radius: 10px;
      }

      .btn-custom {
        border-radius: 10px;
      }
    </style>
  </head>

  <body class="d-flex justify-content-center align-items-center">
    <div class="card shadow-lg login-card" style="width: 350px">
      <div class="text-center mb-4">
        <h3 class="fw-bold">Orelus Rosca App</h3>
        <p class="text-muted">Connectez-vous à votre compte</p>
      </div>

      <form method="post">
        <div class="mb-3">
          <input
            name="username"
            class="form-control"
            placeholder="Nom d'utilisateur"
            required
          />
        </div>

        <div class="mb-3">
          <input
            name="password"
            type="password"
            class="form-control"
            placeholder="Mot de passe"
            required
          />
        </div>

        <button class="btn btn-primary w-100 btn-custom">Se Connecter</button>
      </form>
    </div>
  </body>
</html>
